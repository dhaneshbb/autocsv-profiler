[mypy]
# MyPy configuration for single environment (Python 3.8+)
python_version = 3.8
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
no_implicit_optional = False
warn_redundant_casts = True
warn_unused_ignores = False
warn_no_return = True
warn_unreachable = True
strict_equality = True
show_error_codes = True
ignore_missing_imports = True

# Single-environment specific paths
files = src/autocsv_profiler/core/, src/autocsv_profiler/config/, src/autocsv_profiler/ui/, src/autocsv_profiler/, tests/

# Third-party library stubs - ignore missing imports

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-seaborn.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-statsmodels.*]
ignore_missing_imports = True

[mypy-tqdm.*]
ignore_missing_imports = True

[mypy-psutil.*]
ignore_missing_imports = True

[mypy-tableone.*]
ignore_missing_imports = True

[mypy-researchpy.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-pyyaml.*]
ignore_missing_imports = True

[mypy-autocsv_profiler.ui.*]
ignore_errors = True

[mypy-autocsv_profiler.config.viz_config]
ignore_errors = True

[mypy-autocsv_profiler.summarize]
ignore_errors = True
